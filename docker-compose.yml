services:
  sma-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: sma-web
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "${SMA_WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
